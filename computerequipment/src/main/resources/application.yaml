server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/computer-equipment
    username: root
    password: password
  application:
    name: ComputerEquipment
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379