version: '3.1'

services:
  computerequipment-mysql:
    image: mysql
    restart: always
    container_name: "computer-equipment-mysql"
    environment:
      MYSQL_ROOT_PASSWORD: 'password'
    ports:
      - "3306:3306"
    volumes:
      - ./data.sql:/docker-entrypoint-initdb.d/data.sql
      - computer-equipment-mysql-data:/var/lib/mysql

  computerequipment-redis:
    image: "redis:latest"
    container_name: "computer-equipment-redis-container"
    ports:
      - "6379:6379"
    volumes:
      - computer-equipment-redis-data:/data

volumes:
  computer-equipment-redis-data:
  computer-equipment-mysql-data: